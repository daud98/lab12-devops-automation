version: '3.8'

services:
  # Reverse Proxy / Edge Gateway
  proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - frontend_net
    restart: unless-stopped

  # Application Core
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - REDIS_HOST=cache
    depends_on:
      - database
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  # Secure Relational Database Backend
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: app_admin
      POSTGRES_PASSWORD: secure_db_password_dev
      POSTGRES_DB: app_production
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend_net
    restart: unless-stopped

  # In-Memory Cache Store
  cache:
    image: redis:7-alpine
    networks:
      - backend_net
    restart: unless-stopped

volumes:
  pg_data:
    driver: local

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
