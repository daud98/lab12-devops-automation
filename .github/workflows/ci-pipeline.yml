name: Build and Publish Production Artifacts

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Pull Source Files From Git Repository Branch
        uses: actions/checkout@v4

      - name: Log In to GitHub Container Registry Ecosystem
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrapolate Container Metadata Target Labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            latest

      # --- ADD THIS STEP HERE TO ENABLE GHA CACHING SUPPORTS ---
      - name: Set up Docker Buildx Virtual Builder Environment
        uses: docker/setup-buildx-action@v3

      - name: Publish Verified Final Optimized Multi-Stage Asset Bundle
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
